<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#080d14">
    <title>Page not found | Mike Eliovits</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #080d14;
        color: #f7f3ed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background:
          radial-gradient(circle at 80% 10%, rgb(255 122 26 / 12%), transparent 24rem),
          #080d14;
      }

      main {
        width: min(100%, 42rem);
        padding: clamp(2rem, 7vw, 4.5rem);
        border: 1px solid #263344;
        border-radius: 1.5rem;
        background: #0d151f;
        box-shadow: 0 2rem 5rem rgb(0 0 0 / 28%);
      }

      p {
        max-width: 34rem;
        color: #a9b5c5;
        line-height: 1.7;
      }

      .code {
        margin: 0 0 1rem;
        color: #ff7a1a;
        font: 700 0.78rem/1 ui-monospace, SFMono-Regular, Consolas, monospace;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 8vw, 4.5rem);
        line-height: 1;
        letter-spacing: -0.055em;
      }

      a {
        display: inline-flex;
        margin-top: 1rem;
        padding: 0.85rem 1.1rem;
        border-radius: 0.65rem;
        background: #ff7a1a;
        color: #080d14;
        font-weight: 800;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid #f7f3ed;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="code">Error 404</p>
      <h1>Page not found.</h1>
      <p>
        The page may have moved, or the address may be incorrect. Return to the
        portfolio to explore selected AI and software engineering work.
      </p>
      <a href="/">Back to portfolio</a>
    </main>
  </body>
</html>
